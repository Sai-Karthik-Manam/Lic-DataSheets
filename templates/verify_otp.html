<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP | LIC Manager</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      margin: 0;
    }

    .otp-container {
      max-width: 420px;
      width: 100%;
      background: white;
      padding: 35px 30px;
      border-radius: 20px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.2);
    }

    .otp-header { text-align: center; margin-bottom: 25px; }
    .otp-icon { font-size: 55px; margin-bottom: 12px; }

    .otp-input {
      width: 100%;
      padding: 15px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 24px;
      text-align: center;
      letter-spacing: 8px;
      font-weight: 600;
      margin: 20px 0;
      box-sizing: border-box;
    }

    .otp-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }

    .btn-verify {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-verify:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .resend-section {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
    }

    .btn-resend {
      background: none;
      border: none;
      color: #667eea;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      text-decoration: underline;
    }

    .btn-resend:disabled {
      color: #999;
      cursor: not-allowed;
      text-decoration: none;
    }

    .timer {
      font-size: 13px;
      color: #666;
      margin-top: 10px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="otp-container">

    <div class="otp-header">
      <div class="otp-icon">🔐</div>
      <h1>Verify OTP</h1>
      <p style="color:#666;font-size:13px;">Enter the 6-digit code sent to your email</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="{{ category }}" style="padding:10px;margin-bottom:15px;border-radius:8px;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('verify_otp_page') }}" id="otpForm">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      
      <input 
        type="text"
        id="otp_code"
        name="otp_code"
        class="otp-input"
        maxlength="6"
        pattern="[0-9]{6}"
        required
        placeholder="000000"
        autocomplete="off"
      >

      <button type="submit" class="btn-verify" id="verifyBtn">
        ✓ Verify & Login
      </button>
    </form>

    <div class="resend-section">
      <p style="font-size:13px;color:#666;">Didn't receive the code?</p>
      <button type="button" class="btn-resend" id="resendBtn">
        📧 Resend OTP
      </button>
      <div class="timer" id="timer"></div>
    </div>

    <a href="{{ url_for('login') }}" class="back-link">← Back to Login</a>
  </div>

<script>
  const otpInput = document.getElementById('otp_code');
  const otpForm = document.getElementById('otpForm');
  const verifyBtn = document.getElementById('verifyBtn');
  const resendBtn = document.getElementById('resendBtn');
  const timerDiv = document.getElementById('timer');

  // Only allow numbers
  otpInput.addEventListener('input', () => {
    otpInput.value = otpInput.value.replace(/[^0-9]/g, '');
  });

  // Verify submit
  otpForm.addEventListener('submit', function(e) {
    if (otpInput.value.trim().length !== 6) {
      e.preventDefault();
      alert("Please enter a valid 6-digit OTP");
      return;
    }
    verifyBtn.disabled = true;
    verifyBtn.textContent = "⏳ Verifying...";
  });

  // Resend timer
  let timer = 30;
  let interval;

  function startTimer() {
    resendBtn.disabled = true;
    timer = 30;
    interval = setInterval(() => {
      timer--;
      timerDiv.textContent = "You can resend OTP in " + timer + " seconds";
      if (timer <= 0) {
        clearInterval(interval);
        resendBtn.disabled = false;
        timerDiv.textContent = "";
      }
    }, 1000);
  }

  // Resend OTP
  resendBtn.addEventListener('click', async () => {
    resendBtn.disabled = true;
    resendBtn.textContent = "⏳ Sending...";

    try {
      const response = await fetch("{{ url_for('resend_otp') }}", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          csrf_token: "{{ csrf_token() }}"
        })
      });

      let data;
      try {
        data = await response.json();
      } catch {
        throw new Error("Invalid server response");
      }

      if (data.success) {
        alert("✅ OTP sent successfully!");
        startTimer();
      } else {
        alert("❌ " + (data.error || "Failed to resend OTP"));
        resendBtn.disabled = false;
      }
    } catch (err) {
      alert("❌ Network error. Try again.");
      resendBtn.disabled = false;
    }

    resendBtn.textContent = "📧 Resend OTP";
  });

  // Start timer when page loads
  startTimer();
</script>

</body>
</html>
