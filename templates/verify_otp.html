<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP | LIC Manager</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      margin: 0;
    }

    .otp-container {
      max-width: 420px;
      width: 100%;
      background: white;
      padding: 35px 30px;
      border-radius: 20px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.2);
      text-align: center;
    }

    .otp-icon {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .otp-boxes {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 25px 0;
    }

    .otp-box {
      width: 50px;
      height: 55px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      border: 2px solid #ddd;
      border-radius: 10px;
      transition: 0.3s;
    }

    .otp-box:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
      outline: none;
    }

    .btn-verify {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-resend {
      background: none;
      border: none;
      color: #667eea;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      text-decoration: underline;
      margin-top: 15px;
    }

    .btn-resend:disabled {
      color: #999;
      cursor: not-allowed;
      text-decoration: none;
    }

    .timer {
      font-size: 13px;
      color: #666;
      margin-top: 8px;
    }

    .back-link {
      display: block;
      margin-top: 20px;
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="otp-container">

    <div class="otp-icon">🔐</div>
    <h2>Verify OTP</h2>
    <p style="color:#666;font-size:13px;">
      Enter the 6-digit code sent to your email
    </p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="{{ category }}" style="padding:10px;margin-bottom:15px;border-radius:8px;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('verify_otp_page') }}" id="otpForm">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="otp_code" id="finalOtp">

      <div class="otp-boxes">
        <input type="text" maxlength="1" class="otp-box">
        <input type="text" maxlength="1" class="otp-box">
        <input type="text" maxlength="1" class="otp-box">
        <input type="text" maxlength="1" class="otp-box">
        <input type="text" maxlength="1" class="otp-box">
        <input type="text" maxlength="1" class="otp-box">
      </div>

      <button type="submit" class="btn-verify" id="verifyBtn">
        ✓ Verify & Login
      </button>
    </form>

    <button type="button" class="btn-resend" id="resendBtn">
      📧 Resend OTP
    </button>
    <div class="timer" id="timer"></div>

    <a href="{{ url_for('login') }}" class="back-link">
      ← Back to Login
    </a>

  </div>

<script>
  const otpBoxes = document.querySelectorAll('.otp-box');
  const finalOtp = document.getElementById('finalOtp');
  const otpForm = document.getElementById('otpForm');
  const verifyBtn = document.getElementById('verifyBtn');
  const resendBtn = document.getElementById('resendBtn');
  const timerDiv = document.getElementById('timer');

  // Auto move forward
  otpBoxes.forEach((box, index) => {
    box.addEventListener('input', (e) => {
      box.value = box.value.replace(/[^0-9]/g, '');
      if (box.value && index < otpBoxes.length - 1) {
        otpBoxes[index + 1].focus();
      }
    });

    box.addEventListener('keydown', (e) => {
      if (e.key === "Backspace" && !box.value && index > 0) {
        otpBoxes[index - 1].focus();
      }
    });
  });

  // Paste full OTP
  otpBoxes[0].addEventListener('paste', (e) => {
    e.preventDefault();
    const pasteData = e.clipboardData.getData('text').trim();
    if (/^\d{6}$/.test(pasteData)) {
      otpBoxes.forEach((box, i) => {
        box.value = pasteData[i];
      });
      otpBoxes[5].focus();
    }
  });

  // Submit
  otpForm.addEventListener('submit', function(e) {
    let otp = '';
    otpBoxes.forEach(box => otp += box.value);

    if (otp.length !== 6) {
      e.preventDefault();
      alert("Please enter complete 6-digit OTP");
      return;
    }

    finalOtp.value = otp;
    verifyBtn.disabled = true;
    verifyBtn.textContent = "⏳ Verifying...";
  });

  // Resend Timer
  let timer = 30;
  let interval;

  function startTimer() {
    resendBtn.disabled = true;
    timer = 30;
    interval = setInterval(() => {
      timer--;
      timerDiv.textContent = "Resend available in " + timer + " seconds";
      if (timer <= 0) {
        clearInterval(interval);
        resendBtn.disabled = false;
        timerDiv.textContent = "";
      }
    }, 1000);
  }

  resendBtn.addEventListener('click', async () => {
    resendBtn.disabled = true;
    resendBtn.textContent = "⏳ Sending...";

    try {
      const response = await fetch("{{ url_for('resend_otp') }}", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ csrf_token: "{{ csrf_token() }}" })
      });

      const data = await response.json();

      if (data.success) {
        alert("✅ OTP sent successfully!");
        startTimer();
      } else {
        alert("❌ " + (data.error || "Failed"));
        resendBtn.disabled = false;
      }

    } catch {
      alert("❌ Network error");
      resendBtn.disabled = false;
    }

    resendBtn.textContent = "📧 Resend OTP";
  });

  otpBoxes[0].focus();
  startTimer();
</script>

</body>
</html>
